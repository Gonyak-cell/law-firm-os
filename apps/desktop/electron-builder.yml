appId: com.amic.mater.desktop.internal
productName: mater
artifactName: "mater-internal-${version}-${os}-${arch}.${ext}"

directories:
  buildResources: build
  output: dist

files:
  - "src/**/*"
  - "package.json"
  - "!test/**/*"
  - "!**/*.test.mjs"

mac:
  category: public.app-category.business
  target:
    - dmg
  icon: build/icon.svg

win:
  target:
    - nsis
  icon: build/icon.svg

publish: null
