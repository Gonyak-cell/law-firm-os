appId: com.amic.matter.desktop.internal
productName: matter
artifactName: "matter-internal-${version}-${os}-${arch}.${ext}"

directories:
  buildResources: build
  output: dist

files:
  - "src/**/*"
  - "package.json"
  - "!test/**/*"
  - "!**/*.test.mjs"

mac:
  category: public.app-category.business
  target:
    - dmg
  icon: build/icon.icns

win:
  target:
    - nsis
  icon: build/icon.ico

publish: null
