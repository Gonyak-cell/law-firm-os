<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>matter desktop</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #06102d;
      --ink-2: #17203f;
      --muted: #6b7284;
      --line: rgba(6, 16, 45, 0.1);
      --soft-line: rgba(6, 16, 45, 0.07);
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --red: #ff2d55;
      --yellow: #ffcc00;
      --green: #00ca72;
      --green-dark: #0f3a32;
      --danger: #a23a35;
      --shadow: 0 24px 84px rgba(6, 16, 45, 0.1);
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      --spring: cubic-bezier(0.16, 1.18, 0.32, 1);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--ink);
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }

    body.is-authenticated {
      overflow-x: hidden;
      overflow-y: auto;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--ink);
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 750;
      line-height: 1;
      transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease), background 0.18s var(--ease);
    }

    button:hover {
      background: #0a1738;
      box-shadow: 0 12px 28px rgba(6, 16, 45, 0.16);
      transform: translateY(-1px);
    }

    button.secondary {
      border: 1px solid rgba(6, 16, 45, 0.13);
      background: #ffffff;
      color: var(--ink);
      box-shadow: none;
    }

    button.secondary:hover {
      background: #f8fafb;
      box-shadow: none;
    }

    button:disabled {
      cursor: default;
      opacity: 0.58;
      transform: none;
      box-shadow: none;
    }

    select,
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(6, 16, 45, 0.13);
      border-radius: 8px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 550;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    select:focus,
    input:focus {
      border-color: rgba(0, 202, 114, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 202, 114, 0.12);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      min-height: 100vh;
      background: #ffffff;
    }

    .connection-status {
      position: fixed;
      right: 24px;
      top: 22px;
      z-index: 40;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border: 1px solid rgba(6, 16, 45, 0.11);
      border-radius: 8px;
      padding: 0 13px;
      background: rgba(255, 255, 255, 0.9);
      color: rgba(6, 16, 45, 0.7);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(16px);
      pointer-events: none;
      transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
    }

    body.is-authenticated .connection-status {
      opacity: 0;
      transform: translateY(-8px);
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #c38a05;
    }

    .connection-dot.ok {
      background: var(--green);
    }

    .connection-dot.bad {
      background: var(--danger);
    }

    .auth-stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      padding: 16px;
      opacity: 1;
      visibility: visible;
      transition:
        opacity 0.46s var(--ease),
        transform 0.46s var(--ease),
        filter 0.46s var(--ease),
        visibility 0s linear 0s;
    }

    body.is-authenticated .auth-stage {
      pointer-events: none;
      opacity: 0;
      transform: translateY(18px);
      filter: blur(8px);
      visibility: hidden;
      transition:
        opacity 0.46s var(--ease),
        transform 0.46s var(--ease),
        filter 0.46s var(--ease),
        visibility 0s linear 0.46s;
    }

    .auth-stack {
      position: relative;
      width: min(720px, calc(100vw - 32px));
      min-height: min(720px, calc(100vh - 32px));
      display: grid;
      place-items: center;
    }

    .brand-lockup {
      --mark-size: 150px;
      --word-size: 136px;
      --word-target: 0px;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0;
      color: var(--ink);
      line-height: 1;
      overflow: visible;
      transform-origin: 50% 50%;
      z-index: 2;
      animation:
        brandGap 0.86s var(--ease) 1.52s both,
        brandSettle 0.72s var(--ease) 2.45s both;
    }

    .matter-mark {
      position: relative;
      width: calc(var(--mark-size) * 1.25);
      height: var(--mark-size);
      flex: 0 0 auto;
    }

    .matter-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      will-change: transform, opacity;
      animation: matterMarkImageIn 1.15s var(--spring) both;
    }

    .matter-word-wrap {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      width: 0;
      overflow: hidden;
      clip-path: inset(-0.18em 100% -0.18em 0);
      animation: wordReveal 0.86s var(--ease) 1.52s both;
    }

    .matter-word {
      display: inline-flex;
      align-items: baseline;
      color: var(--ink);
      font-family: Comfortaa, "Avenir Next", "SF Pro Rounded", Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: var(--word-size);
      font-weight: 300;
      letter-spacing: 0.035em;
      transform: translateX(-0.42em) scaleX(0.9);
      transform-origin: 0 50%;
      animation: wordPop 0.82s var(--spring) 1.52s both;
    }

    .matter-word span {
      display: inline-block;
      opacity: 0;
      transform: translateX(-0.35em) scale(0.92);
      animation: letterPop 0.58s var(--spring) both;
    }

    .matter-word span:nth-child(1) { animation-delay: 1.54s; }
    .matter-word span:nth-child(2) { animation-delay: 1.59s; }
    .matter-word span:nth-child(3) { animation-delay: 1.64s; }
    .matter-word span:nth-child(4) { animation-delay: 1.69s; }
    .matter-word span:nth-child(5) { animation-delay: 1.74s; }
    .matter-word span:nth-child(6) { animation-delay: 1.79s; }

    .login-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(412px, 100%);
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translate(-50%, calc(-50% + 108px));
      filter: blur(10px);
      z-index: 1;
      animation: panelIn 0.68s var(--ease) 2.72s both;
    }

    .login-form {
      display: grid;
      gap: 10px;
      padding: 20px 24px 18px;
    }

    .login-form input {
      min-height: 38px;
    }

    .login-form button {
      min-height: 38px;
    }

    .field {
      display: grid;
      gap: 5px;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) both;
    }

    .field:nth-child(1) { animation-delay: 2.88s; }
    .field:nth-child(2) { animation-delay: 2.94s; }
    .field:nth-child(3) { animation-delay: 3s; }
    .field:nth-child(4) { animation-delay: 3.06s; }
    .field:nth-child(5) { animation-delay: 3.12s; }

    .field span,
    .meta-row strong {
      color: rgba(6, 16, 45, 0.66);
      font-size: 12px;
      font-weight: 760;
    }

    .login-actions,
    .check-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) 3.18s both;
    }

    .login-actions {
      animation-delay: 3.24s;
    }

    .login-actions button {
      flex: 1 1 0;
    }

    .login-result {
      min-height: 30px;
      max-height: 30px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 6px 10px;
      background: #fafbfc;
      color: rgba(6, 16, 45, 0.7);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) 3.3s both;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      grid-template-rows: 82px 1fr;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.42s var(--ease) 0.12s, transform 0.42s var(--ease) 0.12s;
    }

    body.is-authenticated .app-shell {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(6, 16, 45, 0.08);
      padding: 0 28px;
      background: rgba(255, 255, 255, 0.94);
    }

    .dock-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dock-brand .matter-mark {
      --mark-size: 34px;
      width: 44px;
      height: 34px;
    }

    .dock-brand .matter-mark img {
      animation: none;
      opacity: 1;
    }

    .dock-brand .matter-word {
      font-size: 36px;
      opacity: 1;
      transform: none;
      animation: none;
    }

    .dock-brand .matter-word span {
      opacity: 1;
      transform: none;
      animation: none;
    }

    .header-session {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      min-width: 0;
      color: rgba(6, 16, 45, 0.66);
      font-size: 13px;
      font-weight: 700;
    }

    .header-session button {
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
    }

    .app-main {
      width: min(1180px, calc(100vw - 56px));
      margin: 36px auto;
      display: grid;
      grid-template-columns: minmax(310px, 390px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: #ffffff;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      border-bottom: 1px solid var(--soft-line);
      padding: 18px 20px;
    }

    .panel-header h2 {
      color: var(--ink);
      font-size: 17px;
      font-weight: 820;
    }

    .panel-body {
      display: grid;
      gap: 14px;
      padding: 18px 20px 20px;
    }

    .account-count,
    .status-label {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 6px;
      padding: 0 9px;
      background: #f1f4f5;
      color: rgba(6, 16, 45, 0.72);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .status-label.allow {
      background: rgba(0, 202, 114, 0.12);
      color: #127044;
    }

    .status-label.deny {
      background: rgba(255, 45, 85, 0.1);
      color: #a52f42;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      align-items: start;
      min-height: 26px;
      font-size: 14px;
      font-weight: 650;
    }

    .status-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .feature-list {
      display: grid;
      gap: 9px;
    }

    .feature {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfd;
      color: var(--ink);
      font-size: 14px;
      font-weight: 720;
    }

    .check-result {
      min-height: 64px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 12px;
      background: #fafbfc;
      color: rgba(6, 16, 45, 0.74);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .result {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .login-result.result {
      white-space: nowrap;
      overflow-wrap: normal;
    }

    @keyframes matterMarkImageIn {
      0% {
        opacity: 0;
        transform: translateY(0.18em) scale(0.82);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @keyframes brandGap {
      to {
        gap: calc(var(--mark-size) * 0.2);
      }
    }

    @keyframes wordReveal {
      to {
        width: var(--word-target);
        clip-path: inset(-0.18em -0.12em -0.18em 0);
      }
    }

    @keyframes wordPop {
      to {
        transform: translateX(0) scaleX(1);
      }
    }

    @keyframes letterPop {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes brandSettle {
      0%,
      28% {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-236px) scale(0.64);
      }
    }

    @keyframes panelIn {
      to {
        opacity: 1;
        transform: translate(-50%, calc(-50% + 88px));
        filter: blur(0);
      }
    }

    @keyframes fieldIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .connection-status {
        position: static;
        justify-self: center;
        margin: 16px auto 0;
      }

      .auth-stage {
        padding: 28px 18px 36px;
      }

      .brand-lockup {
        --mark-size: 118px;
        --word-size: 108px;
      }

      .login-panel {
        width: min(380px, 100%);
      }

      .app-shell {
        grid-template-rows: auto 1fr;
        overflow-y: auto;
      }

      .app-header {
        align-items: flex-start;
        flex-direction: column;
        padding: 18px;
      }

      .app-main {
        width: min(100vw - 24px, 680px);
        grid-template-columns: 1fr;
        margin: 20px auto 28px;
      }

      .meta-row {
        grid-template-columns: 1fr;
        gap: 5px;
      }
    }

    @media (max-width: 520px) {
      .brand-lockup {
        --mark-size: 86px;
        --word-size: 78px;
      }

      .login-panel {
        width: min(340px, calc(100vw - 36px));
        transform: translate(-50%, calc(-50% + 124px));
      }

      .login-form {
        padding: 24px;
      }

      .reset-actions button,
      .login-actions button,
      .check-actions button {
        flex-basis: 100%;
      }

      @keyframes brandSettle {
        0%,
        28% {
          transform: translateY(0) scale(1);
        }

        to {
          transform: translateY(-122px) scale(0.72);
        }
      }

      @keyframes panelIn {
        to {
          opacity: 1;
          transform: translate(-50%, calc(-50% + 108px));
          filter: blur(0);
        }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-delay: 0ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }

      .auth-stage {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app" data-matter-desktop-app>
    <div class="connection-status" data-runtime-status>
      <span class="connection-dot" data-runtime-dot></span>
      <span data-runtime-label>연결 상태 확인 중</span>
    </div>

    <main class="auth-stage" data-auth-stage>
      <div class="auth-stack">
        <div class="brand-lockup" data-launch-logo-flow aria-label="matter">
          <span class="matter-mark" aria-hidden="true">
            <img src="../../build/icon-source-mark.png" alt="" />
          </span>
          <span class="matter-word-wrap" aria-hidden="true">
            <span class="matter-word">
              <span>m</span><span>a</span><span>t</span><span>t</span><span>e</span><span>r</span>
            </span>
          </span>
        </div>

        <section class="login-panel" aria-label="matter 로그인">
          <div class="login-form">
            <label class="field">
              <span>이메일</span>
              <input data-login-email aria-label="Email login" autocomplete="email" inputmode="email" type="email" />
            </label>
            <label class="field">
              <span>비밀번호</span>
              <input data-login-password aria-label="Password login" autocomplete="current-password" type="password" />
            </label>
            <div class="login-actions">
              <button type="button" data-matter-login>로그인</button>
            </div>
            <div class="login-result result" data-login-result>이메일과 비밀번호로 로그인하세요.</div>
          </div>
        </section>
      </div>
    </main>

    <section class="app-shell" aria-label="matter 작업공간">
      <header class="app-header">
        <div class="dock-brand" aria-label="matter">
          <span class="matter-mark" aria-hidden="true">
            <img src="../../build/icon-source-mark.png" alt="" />
          </span>
          <span class="matter-word" aria-hidden="true">
            <span>m</span><span>a</span><span>t</span><span>t</span><span>e</span><span>r</span>
          </span>
        </div>
        <div class="header-session">
          <span data-account-count class="account-count">등록된 계정 0개</span>
          <span data-session-email>로그아웃됨</span>
          <button type="button" class="secondary" data-matter-logout>로그아웃</button>
        </div>
      </header>

      <main class="app-main">
        <section class="panel" aria-label="로그인 상태">
          <div class="panel-header">
            <h2>로그인 상태</h2>
          </div>
          <div class="panel-body">
            <div class="meta-grid">
              <div class="meta-row">
                <strong>이메일</strong>
                <span data-session-email-mirror>로그아웃됨</span>
              </div>
              <div class="meta-row">
                <strong>권한</strong>
                <span data-session-privilege>로그아웃</span>
              </div>
              <div class="meta-row">
                <strong>역할</strong>
                <div class="status-list" data-session-roles></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel" aria-label="기능 확인">
          <div class="panel-header">
            <h2>기능 확인</h2>
            <div class="check-actions">
              <button type="button" class="secondary" data-check-dashboard>업무 보드 확인</button>
              <button type="button" class="secondary" data-check-admin>관리 기능 확인</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="feature-list" data-feature-list></div>
            <div class="check-result result" data-check-result>계정을 선택하고 로그인한 뒤 기능을 확인하세요.</div>
          </div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const api = window.matterSession;
    const state = {
      accounts: [],
      session: { state: "signed_out" },
      features: []
    };

    const nodes = {
      runtimeDot: document.querySelector("[data-runtime-dot]"),
      runtimeLabel: document.querySelector("[data-runtime-label]"),
      accountCount: document.querySelector("[data-account-count]"),
      loginEmailInput: document.querySelector("[data-login-email]"),
      loginPasswordInput: document.querySelector("[data-login-password]"),
      loginButton: document.querySelector("[data-matter-login]"),
      logoutButton: document.querySelector("[data-matter-logout]"),
      dashboardCheckButton: document.querySelector("[data-check-dashboard]"),
      adminCheckButton: document.querySelector("[data-check-admin]"),
      loginResult: document.querySelector("[data-login-result]"),
      sessionEmail: document.querySelector("[data-session-email]"),
      sessionEmailMirror: document.querySelector("[data-session-email-mirror]"),
      sessionPrivilege: document.querySelector("[data-session-privilege]"),
      sessionRoles: document.querySelector("[data-session-roles]"),
      featureList: document.querySelector("[data-feature-list]"),
      checkResult: document.querySelector("[data-check-result]")
    };

    const brandLockup = document.querySelector("[data-launch-logo-flow]");
    const brandWord = brandLockup?.querySelector(".matter-word");

    function setMatterWordTarget() {
      if (!brandLockup || !brandWord) return;
      brandLockup.style.setProperty("--word-target", `${Math.ceil(brandWord.scrollWidth + 10)}px`);
    }

    setMatterWordTarget();
    window.addEventListener("resize", setMatterWordTarget);
    if (document.fonts) {
      document.fonts.ready.then(setMatterWordTarget);
    }

    function loginEmail() {
      return nodes.loginEmailInput.value.trim();
    }

    function clearPasswordFields() {
      nodes.loginPasswordInput.value = "";
    }

    function setAuthenticated(isAuthenticated) {
      document.body.classList.toggle("is-authenticated", Boolean(isAuthenticated));
    }

    function renderRuntime(runtime) {
      const ok = Boolean(runtime?.configured);
      nodes.runtimeDot.className = `connection-dot ${ok ? "ok" : "bad"}`;
      nodes.runtimeLabel.textContent = ok
        ? "작업공간 연결됨"
        : "작업공간 연결이 필요합니다.";
    }

    function renderAccounts(accounts) {
      state.accounts = accounts;
      nodes.accountCount.textContent = `등록된 계정 ${accounts.length}개`;
    }

    function roleLabel(role) {
      if (role === "system_super_admin") return "시스템 관리자";
      if (role === "matter_runtime_user") return "사용자";
      return "사용자";
    }

    function renderRoles(roles = []) {
      nodes.sessionRoles.replaceChildren(
        ...roles.map((role) => {
          const label = document.createElement("span");
          label.className = "status-label";
          label.textContent = roleLabel(role);
          return label;
        })
      );
    }

    function privilegeLabel(session) {
      const roles = Array.isArray(session.role_ids) ? session.role_ids : [];
      if (
        roles.includes("system_super_admin") ||
        session.highest_privilege === true ||
        session.highest_privilege === "true" ||
        session.highest_privilege === "system_super_admin"
      ) {
        return "최고 관리자";
      }
      if (session.state === "signed_in" || session.email) return "일반 계정";
      return "로그아웃";
    }

    function renderSession(session = { state: "signed_out" }) {
      state.session = session;
      const email = session.email ?? "로그아웃됨";
      nodes.sessionEmail.textContent = email;
      nodes.sessionEmailMirror.textContent = email;
      nodes.sessionPrivilege.textContent = privilegeLabel(session);
      renderRoles(session.role_ids ?? []);
      setAuthenticated(session.state === "signed_in" || Boolean(session.email));
    }

    function renderFeatures(features = []) {
      state.features = features;
      nodes.featureList.replaceChildren(
        ...features.map((feature) => {
          const row = document.createElement("div");
          row.className = "feature";
          const name = document.createElement("span");
          name.textContent = feature.label;
          const decision = document.createElement("span");
          decision.className = `status-label ${feature.allowed ? "allow" : "deny"}`;
          decision.textContent = feature.allowed ? "사용 가능" : "제한됨";
          row.append(name, decision);
          return row;
        })
      );
    }

    function summarizeCheck(response) {
      if (response?.allowed === true || response?.decision === "allow") return "기능 확인 결과: 사용 가능합니다.";
      if (response?.allowed === false || response?.decision === "deny") return "기능 확인 결과: 제한되어 있습니다.";
      return "기능 확인 결과를 확인했습니다.";
    }

    function productUiTarget() {
      return new URL("./web/index.html?desktop=1&view=home&data=live&ctx=allow&splash=1", window.location.href).toString();
    }

    const LAWOS_SESSION_ENVELOPE_STORAGE_KEY = "lawos.session.envelope";
    const LAWOS_SESSION_ENVELOPE_SCHEMA_VERSION = "law-firm-os.desktop-web-session-envelope.v0.1";
    const SAFE_HANDOFF_REF_PATTERN = /^[A-Za-z0-9._:-]{1,160}$/;
    const FORBIDDEN_HANDOFF_TEXT = /(password|reset|bearer|cookie|secret|credential|authorization|token|sk-)/i;

    function safeHandoffRef(value) {
      if (typeof value !== "string") return null;
      const ref = value.trim();
      if (!ref || ref.includes("@") || !SAFE_HANDOFF_REF_PATTERN.test(ref) || FORBIDDEN_HANDOFF_TEXT.test(ref)) return null;
      return ref;
    }

    function safeHandoffRefList(values) {
      if (!Array.isArray(values)) return [];
      return values.map((value) => safeHandoffRef(value)).filter(Boolean).slice(0, 24);
    }

    function desktopSessionEnvelope(session) {
      const actorRef = safeHandoffRef(session?.user_id ?? session?.actor_ref);
      const tenantRef = safeHandoffRef(session?.tenant_id);
      if (!actorRef || !tenantRef) return null;
      const generation = Number.isFinite(Number(session?.session_generation)) ? String(Number(session.session_generation)) : "0";
      return {
        schema_version: LAWOS_SESSION_ENVELOPE_SCHEMA_VERSION,
        state: "signed_in",
        session_ref: `desktop:${actorRef}:${generation}`,
        source: "desktop_offline_login",
        actor_ref: actorRef,
        tenant_refs: {
          default: tenantRef,
          client: "tenant_rp04_synthetic",
          matter: "tenant_rp05_synthetic",
          vault: "tenant_amic_matter_vault",
          crm: "tenant_cmp_g6_synthetic"
        },
        role_ids: safeHandoffRefList(session?.role_ids),
        scopes: safeHandoffRefList(session?.scopes),
        review_state: "allow",
        expires_at: new Date(Date.now() + 60 * 60 * 1000).toISOString()
      };
    }

    function writeSessionEnvelope(session) {
      const envelope = desktopSessionEnvelope(session);
      if (!envelope) return false;
      try {
        window.sessionStorage.setItem(LAWOS_SESSION_ENVELOPE_STORAGE_KEY, JSON.stringify(envelope));
        return true;
      } catch {
        return false;
      }
    }

    function clearSessionEnvelope() {
      try {
        window.sessionStorage.removeItem(LAWOS_SESSION_ENVELOPE_STORAGE_KEY);
      } catch {
        // Session handoff storage is best-effort and contains reference-only data.
      }
    }

    function handoffToProductUi(session) {
      if (!(session?.state === "signed_in" || session?.email)) return;
      writeSessionEnvelope(session);
      document.body.dataset.productHandoff = "apps-web";
      nodes.loginResult.textContent = `${session.email} 계정으로 로그인했습니다. matter 작업공간을 여는 중입니다.`;
      window.setTimeout(() => {
        window.location.assign(productUiTarget());
      }, 350);
    }

    async function refresh() {
      if (!api) {
        renderRuntime({ configured: false, reason: "preload_api_unavailable" });
        return;
      }
      renderRuntime(await api.runtime());
      const accountsResponse = await api.accounts();
      if (accountsResponse.ok) renderAccounts(accountsResponse.users ?? []);
      else nodes.loginResult.textContent = "계정 정보를 불러오지 못했습니다.";
      renderSession(await api.status());
    }

    async function login() {
      const email = loginEmail();
      const password = nodes.loginPasswordInput.value;
      const response = await api.login({ email, password });
      renderSession(response.session);
      renderFeatures(response.features ?? []);
      nodes.loginResult.textContent = response.ok
        ? `${response.session.email} 계정으로 로그인했습니다.`
        : "로그인하지 못했습니다.";
      if (response.ok) handoffToProductUi(response.session);
    }

    async function logout() {
      const session = await api.logout();
      clearSessionEnvelope();
      renderSession(session);
      renderFeatures([]);
      nodes.loginResult.textContent = "로그아웃되었습니다.";
      nodes.checkResult.textContent = "계정을 선택하고 로그인한 뒤 기능을 확인하세요.";
    }

    async function checkFeature(featureId) {
      const email = state.session.email ?? loginEmail();
      const response = await api.smoke({ email, featureId });
      nodes.checkResult.textContent = summarizeCheck(response);
    }

    nodes.loginButton.addEventListener("click", () => login().catch((error) => {
      nodes.loginResult.textContent = "로그인 요청을 처리하지 못했습니다.";
    }));
    nodes.logoutButton.addEventListener("click", () => logout().catch((error) => {
      nodes.loginResult.textContent = "로그아웃 요청을 처리하지 못했습니다.";
    }));
    nodes.dashboardCheckButton.addEventListener("click", () => checkFeature("matter_vault_dashboard").catch((error) => {
      nodes.checkResult.textContent = "기능 확인에 실패했습니다.";
    }));
    nodes.adminCheckButton.addEventListener("click", () => checkFeature("matter_vault_admin").catch((error) => {
      nodes.checkResult.textContent = "기능 확인에 실패했습니다.";
    }));

    refresh().catch((error) => {
      renderRuntime({ configured: false });
    });
  </script>
</body>
</html>
