<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>matter desktop</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #06102d;
      --ink-2: #17203f;
      --muted: #6b7284;
      --line: rgba(6, 16, 45, 0.1);
      --soft-line: rgba(6, 16, 45, 0.07);
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --red: #ff2d55;
      --yellow: #ffcc00;
      --green: #00ca72;
      --green-dark: #0f3a32;
      --danger: #a23a35;
      --shadow: 0 24px 84px rgba(6, 16, 45, 0.1);
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      --spring: cubic-bezier(0.16, 1.18, 0.32, 1);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--ink);
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #ffffff;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--ink);
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 750;
      line-height: 1;
      transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease), background 0.18s var(--ease);
    }

    button:hover {
      background: #0a1738;
      box-shadow: 0 12px 28px rgba(6, 16, 45, 0.16);
      transform: translateY(-1px);
    }

    button.secondary {
      border: 1px solid rgba(6, 16, 45, 0.13);
      background: #ffffff;
      color: var(--ink);
      box-shadow: none;
    }

    button.secondary:hover {
      background: #f8fafb;
      box-shadow: none;
    }

    button:disabled {
      cursor: default;
      opacity: 0.58;
      transform: none;
      box-shadow: none;
    }

    select,
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(6, 16, 45, 0.13);
      border-radius: 8px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 550;
      outline: none;
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }

    select:focus,
    input:focus {
      border-color: rgba(0, 202, 114, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 202, 114, 0.12);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      min-height: 100vh;
      background: #ffffff;
    }

    .runtime-pill {
      position: fixed;
      right: 24px;
      top: 22px;
      z-index: 40;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border: 1px solid rgba(6, 16, 45, 0.11);
      border-radius: 999px;
      padding: 0 13px;
      background: rgba(255, 255, 255, 0.9);
      color: rgba(6, 16, 45, 0.7);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(16px);
      pointer-events: none;
      transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
    }

    body.is-authenticated .runtime-pill {
      opacity: 0;
      transform: translateY(-8px);
    }

    .runtime-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #c38a05;
    }

    .runtime-dot.ok {
      background: var(--green);
    }

    .runtime-dot.bad {
      background: var(--danger);
    }

    .auth-stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 72px 24px 48px;
      visibility: visible;
      transition:
        opacity 0.46s var(--ease),
        transform 0.46s var(--ease),
        filter 0.46s var(--ease),
        visibility 0s linear 0s;
    }

    body.is-authenticated .auth-stage {
      pointer-events: none;
      opacity: 0;
      transform: translateY(18px);
      filter: blur(8px);
      visibility: hidden;
      transition:
        opacity 0.46s var(--ease),
        transform 0.46s var(--ease),
        filter 0.46s var(--ease),
        visibility 0s linear 0.46s;
    }

    .auth-stack {
      width: min(620px, 100%);
      display: grid;
      justify-items: center;
      gap: 28px;
    }

    .brand-lockup {
      --mark-size: 118px;
      --word-size: 90px;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 20px;
      color: var(--ink);
      line-height: 1;
      overflow: visible;
      animation: brandSettle 0.72s var(--ease) 2.35s both;
    }

    .matter-mark {
      position: relative;
      width: calc(var(--mark-size) * 1.25);
      height: var(--mark-size);
      flex: 0 0 auto;
    }

    .matter-bar,
    .matter-dot {
      position: absolute;
      display: block;
      will-change: transform, opacity;
    }

    .matter-bar {
      top: calc(var(--mark-size) * 0.03);
      width: calc(var(--mark-size) * 0.34);
      height: calc(var(--mark-size) * 0.9);
      border-radius: 999px;
      transform: rotate(31deg);
    }

    .matter-bar.red {
      left: calc(var(--mark-size) * 0.08);
      background: var(--red);
      animation: redBuild 1.15s var(--spring) both;
    }

    .matter-bar.yellow {
      left: calc(var(--mark-size) * 0.52);
      background: var(--yellow);
      animation: yellowBuild 1.15s var(--spring) 0.14s both;
    }

    .matter-dot {
      right: calc(var(--mark-size) * 0.03);
      bottom: calc(var(--mark-size) * 0.09);
      width: calc(var(--mark-size) * 0.36);
      height: calc(var(--mark-size) * 0.36);
      border-radius: 50%;
      background: var(--green);
      animation: dotBuild 1.1s var(--spring) 0.26s both;
    }

    .matter-word {
      display: inline-flex;
      align-items: baseline;
      color: var(--ink);
      font-family: "Avenir Next", "SF Pro Rounded", Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: var(--word-size);
      font-weight: 300;
      letter-spacing: 0;
      opacity: 0;
      transform: translateX(-28px) scaleX(0.92);
      transform-origin: 0 50%;
      animation: wordPop 0.82s var(--spring) 1.52s both;
    }

    .matter-word span {
      display: inline-block;
      opacity: 0;
      transform: translateX(-0.35em) scale(0.92);
      animation: letterPop 0.58s var(--spring) both;
    }

    .matter-word span:nth-child(1) { animation-delay: 1.54s; }
    .matter-word span:nth-child(2) { animation-delay: 1.59s; }
    .matter-word span:nth-child(3) { animation-delay: 1.64s; }
    .matter-word span:nth-child(4) { animation-delay: 1.69s; }
    .matter-word span:nth-child(5) { animation-delay: 1.74s; }
    .matter-word span:nth-child(6) { animation-delay: 1.79s; }

    .login-panel {
      width: min(412px, 100%);
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(54px);
      filter: blur(10px);
      animation: panelIn 0.68s var(--ease) 2.62s both;
    }

    .login-form {
      display: grid;
      gap: 16px;
      padding: 28px;
    }

    .field {
      display: grid;
      gap: 7px;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) both;
    }

    .field:nth-child(1) { animation-delay: 2.88s; }
    .field:nth-child(2) { animation-delay: 2.94s; }
    .field:nth-child(3) { animation-delay: 3s; }
    .field:nth-child(4) { animation-delay: 3.06s; }
    .field:nth-child(5) { animation-delay: 3.12s; }

    .field span,
    .meta-row strong {
      color: rgba(6, 16, 45, 0.66);
      font-size: 12px;
      font-weight: 760;
    }

    .reset-actions,
    .login-actions,
    .smoke-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) 3.18s both;
    }

    .login-actions {
      animation-delay: 3.24s;
    }

    .reset-actions button,
    .login-actions button {
      flex: 1 1 0;
    }

    .login-result {
      min-height: 42px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fafbfc;
      color: rgba(6, 16, 45, 0.7);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      opacity: 0;
      transform: translateY(10px);
      animation: fieldIn 0.44s var(--ease) 3.3s both;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      grid-template-rows: 82px 1fr;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.42s var(--ease) 0.12s, transform 0.42s var(--ease) 0.12s;
    }

    body.is-authenticated .app-shell {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(6, 16, 45, 0.08);
      padding: 0 28px;
      background: rgba(255, 255, 255, 0.94);
    }

    .dock-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dock-brand .matter-mark {
      --mark-size: 34px;
      width: 44px;
      height: 34px;
    }

    .dock-brand .matter-bar,
    .dock-brand .matter-dot {
      animation: none;
      opacity: 1;
    }

    .dock-brand .matter-word {
      font-size: 36px;
      opacity: 1;
      transform: none;
      animation: none;
    }

    .dock-brand .matter-word span {
      opacity: 1;
      transform: none;
      animation: none;
    }

    .header-session {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      min-width: 0;
      color: rgba(6, 16, 45, 0.66);
      font-size: 13px;
      font-weight: 700;
    }

    .header-session button {
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
    }

    .app-main {
      width: min(1180px, calc(100vw - 56px));
      margin: 36px auto;
      display: grid;
      grid-template-columns: minmax(310px, 390px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: #ffffff;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      border-bottom: 1px solid var(--soft-line);
      padding: 18px 20px;
    }

    .panel-header h2 {
      color: var(--ink);
      font-size: 17px;
      font-weight: 820;
    }

    .panel-body {
      display: grid;
      gap: 14px;
      padding: 18px 20px 20px;
    }

    .account-count,
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 9px;
      background: #f1f4f5;
      color: rgba(6, 16, 45, 0.72);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .pill.allow {
      background: rgba(0, 202, 114, 0.12);
      color: #127044;
    }

    .pill.deny {
      background: rgba(255, 45, 85, 0.1);
      color: #a52f42;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      align-items: start;
      min-height: 26px;
      font-size: 14px;
      font-weight: 650;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .feature-list {
      display: grid;
      gap: 9px;
    }

    .feature {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfd;
      color: var(--ink);
      font-size: 14px;
      font-weight: 720;
    }

    .smoke-result {
      min-height: 64px;
      border: 1px solid rgba(6, 16, 45, 0.08);
      border-radius: 8px;
      padding: 12px;
      background: #fafbfc;
      color: rgba(6, 16, 45, 0.74);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .result {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    @keyframes redBuild {
      0% {
        opacity: 0;
        transform: translate(-0.52em, 0.32em) rotate(95deg) scale(0.22);
      }
      38% {
        opacity: 1;
        transform: translate(0.1em, -0.06em) rotate(-22deg) scale(1.04);
      }
      70% {
        opacity: 1;
        transform: translate(-0.04em, 0.02em) rotate(38deg) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) rotate(31deg) scale(1);
      }
    }

    @keyframes yellowBuild {
      0% {
        opacity: 0;
        transform: translate(-0.8em, 0.1em) rotate(120deg) scale(0.18);
      }
      38% {
        opacity: 1;
        transform: translate(-0.05em, 0.02em) rotate(-14deg) scale(1.02);
      }
      70% {
        opacity: 1;
        transform: translate(0.04em, -0.02em) rotate(37deg) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) rotate(31deg) scale(1);
      }
    }

    @keyframes dotBuild {
      0% {
        opacity: 0;
        transform: translate(-1.65em, -1.1em) scale(0.18);
      }
      34% {
        opacity: 1;
        transform: translate(-1.1em, -1.75em) scale(1.04);
      }
      62% {
        opacity: 1;
        transform: translate(-0.2em, 0.06em) scale(0.95);
      }
      82% {
        opacity: 1;
        transform: translate(0.04em, -0.04em) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @keyframes wordPop {
      to {
        opacity: 1;
        transform: translateX(0) scaleX(1);
      }
    }

    @keyframes letterPop {
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes brandSettle {
      to {
        transform: translateY(-24px) scale(0.72);
      }
    }

    @keyframes panelIn {
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes fieldIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .runtime-pill {
        position: static;
        justify-self: center;
        margin: 16px auto 0;
      }

      .auth-stage {
        padding: 28px 18px 36px;
      }

      .brand-lockup {
        --mark-size: 74px;
        --word-size: 56px;
        gap: 12px;
      }

      .login-panel {
        width: min(380px, 100%);
      }

      .app-shell {
        grid-template-rows: auto 1fr;
        overflow-y: auto;
      }

      .app-header {
        align-items: flex-start;
        flex-direction: column;
        padding: 18px;
      }

      .app-main {
        width: min(100vw - 24px, 680px);
        grid-template-columns: 1fr;
        margin: 20px auto 28px;
      }

      .meta-row {
        grid-template-columns: 1fr;
        gap: 5px;
      }
    }

    @media (max-width: 520px) {
      .brand-lockup {
        --mark-size: 58px;
        --word-size: 44px;
      }

      .login-form {
        padding: 24px;
      }

      .reset-actions button,
      .login-actions button,
      .smoke-actions button {
        flex-basis: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-delay: 0ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" data-matter-desktop-app>
    <div class="runtime-pill" data-runtime-status>
      <span class="runtime-dot" data-runtime-dot></span>
      <span data-runtime-label>Checking runtime</span>
    </div>

    <main class="auth-stage" data-auth-stage>
      <div class="auth-stack">
        <div class="brand-lockup" aria-label="matter">
          <span class="matter-mark" aria-hidden="true">
            <span class="matter-bar red"></span>
            <span class="matter-bar yellow"></span>
            <span class="matter-dot"></span>
          </span>
          <span class="matter-word" aria-hidden="true">
            <span>m</span><span>a</span><span>t</span><span>t</span><span>e</span><span>r</span>
          </span>
        </div>

        <section class="login-panel" aria-label="matter 로그인">
          <div class="login-form">
            <label class="field">
              <span>계정</span>
              <select data-account-select aria-label="Registered account"></select>
            </label>
            <label class="field">
              <span>재설정 토큰</span>
              <input data-reset-token aria-label="Reset token" autocomplete="off" />
            </label>
            <label class="field">
              <span>새 비밀번호</span>
              <input data-new-password aria-label="New password" autocomplete="new-password" type="password" />
            </label>
            <label class="field">
              <span>새 비밀번호 확인</span>
              <input data-confirm-password aria-label="Confirm new password" autocomplete="new-password" type="password" />
            </label>
            <label class="field">
              <span>비밀번호</span>
              <input data-login-password aria-label="Password login" autocomplete="current-password" type="password" />
            </label>
            <div class="reset-actions">
              <button type="button" class="secondary" data-reset-request>재설정 이메일 요청</button>
              <button type="button" class="secondary" data-reset-latest>최신 재설정 메일 열기</button>
              <button type="button" class="secondary" data-reset-confirm>비밀번호 설정</button>
            </div>
            <div class="login-actions">
              <button type="button" data-matter-login>로그인</button>
            </div>
            <div class="login-result result" data-login-result>Reset email request, password setup, then log in.</div>
          </div>
        </section>
      </div>
    </main>

    <section class="app-shell" aria-label="matter desktop workspace">
      <header class="app-header">
        <div class="dock-brand" aria-label="matter">
          <span class="matter-mark" aria-hidden="true">
            <span class="matter-bar red"></span>
            <span class="matter-bar yellow"></span>
            <span class="matter-dot"></span>
          </span>
          <span class="matter-word" aria-hidden="true">
            <span>m</span><span>a</span><span>t</span><span>t</span><span>e</span><span>r</span>
          </span>
        </div>
        <div class="header-session">
          <span data-account-count class="account-count">0 registered</span>
          <span data-session-email>signed out</span>
          <button type="button" class="secondary" data-matter-logout>로그아웃</button>
        </div>
      </header>

      <main class="app-main">
        <section class="panel" aria-label="Session status">
          <div class="panel-header">
            <h2>Session</h2>
          </div>
          <div class="panel-body">
            <div class="meta-grid">
              <div class="meta-row">
                <strong>Email</strong>
                <span data-session-email-mirror>signed out</span>
              </div>
              <div class="meta-row">
                <strong>Privilege</strong>
                <span data-session-privilege>none</span>
              </div>
              <div class="meta-row">
                <strong>Roles</strong>
                <div class="pill-row" data-session-roles></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel" aria-label="Runtime smoke">
          <div class="panel-header">
            <h2>Function smoke</h2>
            <div class="smoke-actions">
              <button type="button" class="secondary" data-smoke-dashboard>Dashboard smoke</button>
              <button type="button" class="secondary" data-smoke-admin>Admin smoke</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="feature-list" data-feature-list></div>
            <div class="smoke-result result" data-smoke-result>Select an account, log in, then run a smoke check.</div>
          </div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const api = window.matterSession;
    const state = {
      accounts: [],
      session: { state: "signed_out" },
      features: []
    };

    const nodes = {
      runtimeDot: document.querySelector("[data-runtime-dot]"),
      runtimeLabel: document.querySelector("[data-runtime-label]"),
      accountCount: document.querySelector("[data-account-count]"),
      accountSelect: document.querySelector("[data-account-select]"),
      resetRequestButton: document.querySelector("[data-reset-request]"),
      resetLatestButton: document.querySelector("[data-reset-latest]"),
      resetTokenInput: document.querySelector("[data-reset-token]"),
      newPasswordInput: document.querySelector("[data-new-password]"),
      confirmPasswordInput: document.querySelector("[data-confirm-password]"),
      resetConfirmButton: document.querySelector("[data-reset-confirm]"),
      loginPasswordInput: document.querySelector("[data-login-password]"),
      loginButton: document.querySelector("[data-matter-login]"),
      logoutButton: document.querySelector("[data-matter-logout]"),
      dashboardSmokeButton: document.querySelector("[data-smoke-dashboard]"),
      adminSmokeButton: document.querySelector("[data-smoke-admin]"),
      loginResult: document.querySelector("[data-login-result]"),
      sessionEmail: document.querySelector("[data-session-email]"),
      sessionEmailMirror: document.querySelector("[data-session-email-mirror]"),
      sessionPrivilege: document.querySelector("[data-session-privilege]"),
      sessionRoles: document.querySelector("[data-session-roles]"),
      featureList: document.querySelector("[data-feature-list]"),
      smokeResult: document.querySelector("[data-smoke-result]")
    };

    function accountLabel(account) {
      const role = Array.isArray(account.role_ids) && account.role_ids.includes("system_super_admin")
        ? "system super admin"
        : "registered";
      return `${account.email} - ${role}`;
    }

    function selectedEmail() {
      return nodes.accountSelect.value;
    }

    function clearPasswordFields() {
      nodes.newPasswordInput.value = "";
      nodes.confirmPasswordInput.value = "";
      nodes.loginPasswordInput.value = "";
    }

    function setAuthenticated(isAuthenticated) {
      document.body.classList.toggle("is-authenticated", Boolean(isAuthenticated));
    }

    function renderRuntime(runtime) {
      const ok = Boolean(runtime?.configured);
      nodes.runtimeDot.className = `runtime-dot ${ok ? "ok" : "bad"}`;
      nodes.runtimeLabel.textContent = ok
        ? "AWS temporary runtime connected"
        : `Runtime unavailable: ${runtime?.reason ?? "not configured"}`;
    }

    function renderAccounts(accounts) {
      state.accounts = accounts;
      nodes.accountCount.textContent = `${accounts.length} registered`;
      nodes.accountSelect.replaceChildren(
        ...accounts.map((account) => {
          const option = document.createElement("option");
          option.value = account.email;
          option.textContent = accountLabel(account);
          return option;
        })
      );
      const preferred = accounts.find((account) => account.email === "jwsuh@amic.kr");
      if (preferred) nodes.accountSelect.value = preferred.email;
    }

    function renderRoles(roles = []) {
      nodes.sessionRoles.replaceChildren(
        ...roles.map((role) => {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = role;
          return pill;
        })
      );
    }

    function privilegeLabel(session) {
      const roles = Array.isArray(session.role_ids) ? session.role_ids : [];
      if (
        roles.includes("system_super_admin") ||
        session.highest_privilege === true ||
        session.highest_privilege === "true" ||
        session.highest_privilege === "system_super_admin"
      ) {
        return "system super admin";
      }
      if (session.state === "signed_in" || session.email) return "standard account";
      return "none";
    }

    function renderSession(session = { state: "signed_out" }) {
      state.session = session;
      const email = session.email ?? "signed out";
      nodes.sessionEmail.textContent = email;
      nodes.sessionEmailMirror.textContent = email;
      nodes.sessionPrivilege.textContent = privilegeLabel(session);
      renderRoles(session.role_ids ?? []);
      setAuthenticated(session.state === "signed_in" || Boolean(session.email));
    }

    function renderFeatures(features = []) {
      state.features = features;
      nodes.featureList.replaceChildren(
        ...features.map((feature) => {
          const row = document.createElement("div");
          row.className = "feature";
          const name = document.createElement("span");
          name.textContent = feature.label;
          const decision = document.createElement("span");
          decision.className = `pill ${feature.allowed ? "allow" : "deny"}`;
          decision.textContent = feature.decision;
          row.append(name, decision);
          return row;
        })
      );
    }

    function summarizeSmoke(response) {
      const status = response.http_status ? `HTTP ${response.http_status}` : "local";
      const decision = response.decision ?? response.reason ?? "unknown";
      return `${status} ${decision}\nfeature: ${response.feature_id ?? "n/a"}\nactor: ${response.actor_email ?? selectedEmail()}`;
    }

    function productUiTarget() {
      return new URL("./web/index.html?desktop=1&view=home&data=live&ctx=allow&splash=1", window.location.href).toString();
    }

    function handoffToProductUi(session) {
      if (!(session?.state === "signed_in" || session?.email)) return;
      document.body.dataset.productHandoff = "apps-web";
      nodes.loginResult.textContent = `Signed in as ${session.email}. Opening matter workspace.`;
      window.setTimeout(() => {
        window.location.assign(productUiTarget());
      }, 350);
    }

    async function refresh() {
      if (!api) {
        renderRuntime({ configured: false, reason: "preload_api_unavailable" });
        return;
      }
      renderRuntime(await api.runtime());
      const accountsResponse = await api.accounts();
      if (accountsResponse.ok) renderAccounts(accountsResponse.users ?? []);
      else nodes.loginResult.textContent = `Account load failed: ${accountsResponse.reason}`;
      renderSession(await api.status());
    }

    async function requestPasswordReset() {
      const email = selectedEmail();
      const response = await api.requestPasswordReset({ email });
      nodes.loginResult.textContent = response.ok
        ? `Reset email accepted for ${email}.`
        : `Reset request failed: ${response.reason}`;
    }

    async function latestResetEmail() {
      const email = selectedEmail();
      const response = await api.latestResetEmail({ email });
      if (response.ok && response.email_message?.reset_token) {
        nodes.resetTokenInput.value = response.email_message.reset_token;
        nodes.loginResult.textContent = `Latest reset email opened for ${response.email_message.to}. Expires at ${response.email_message.expires_at}.`;
      } else {
        nodes.loginResult.textContent = `Reset email unavailable: ${response.reason}`;
      }
    }

    async function confirmPasswordReset() {
      const token = nodes.resetTokenInput.value.trim();
      const password = nodes.newPasswordInput.value;
      if (password !== nodes.confirmPasswordInput.value) {
        nodes.loginResult.textContent = "Password confirmation does not match.";
        return;
      }
      const response = await api.confirmPasswordReset({ token, password });
      if (response.ok) {
        clearPasswordFields();
        nodes.loginResult.textContent = "Password set. Log in with the new password.";
      } else {
        nodes.loginResult.textContent = `Password setup failed: ${response.reason}`;
      }
    }

    async function login() {
      const email = selectedEmail();
      const password = nodes.loginPasswordInput.value;
      const response = await api.login({ email, password });
      renderSession(response.session);
      renderFeatures(response.features ?? []);
      nodes.loginResult.textContent = response.ok
        ? `Signed in as ${response.session.email}.`
        : `Login failed: ${response.reason}`;
      if (response.ok) handoffToProductUi(response.session);
    }

    async function logout() {
      const session = await api.logout();
      renderSession(session);
      renderFeatures([]);
      nodes.loginResult.textContent = "Signed out.";
      nodes.smokeResult.textContent = "Select an account, log in, then run a smoke check.";
    }

    async function smoke(featureId) {
      const email = state.session.email ?? selectedEmail();
      const response = await api.smoke({ email, featureId });
      nodes.smokeResult.textContent = summarizeSmoke(response);
    }

    nodes.resetRequestButton.addEventListener("click", () => requestPasswordReset().catch((error) => {
      nodes.loginResult.textContent = error.message;
    }));
    nodes.resetLatestButton.addEventListener("click", () => latestResetEmail().catch((error) => {
      nodes.loginResult.textContent = error.message;
    }));
    nodes.resetConfirmButton.addEventListener("click", () => confirmPasswordReset().catch((error) => {
      nodes.loginResult.textContent = error.message;
    }));
    nodes.loginButton.addEventListener("click", () => login().catch((error) => {
      nodes.loginResult.textContent = error.message;
    }));
    nodes.logoutButton.addEventListener("click", () => logout().catch((error) => {
      nodes.loginResult.textContent = error.message;
    }));
    nodes.dashboardSmokeButton.addEventListener("click", () => smoke("matter_vault_dashboard").catch((error) => {
      nodes.smokeResult.textContent = error.message;
    }));
    nodes.adminSmokeButton.addEventListener("click", () => smoke("matter_vault_admin").catch((error) => {
      nodes.smokeResult.textContent = error.message;
    }));

    refresh().catch((error) => {
      renderRuntime({ configured: false, reason: error.message });
    });
  </script>
</body>
</html>
